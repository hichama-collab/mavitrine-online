<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ma Vitrine Online | Showroom</title>
    <meta name="description" content="Showroom Ma Vitrine Online avec 6 categories claires et un grand coverflow pour presenter les modeles.">
    <link rel="icon" href="./shared/logo-ma-vitrine-online.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-1: #0c0d14;
        --bg-2: #151725;
        --ink: rgba(255, 255, 255, 0.94);
        --ink-soft: rgba(255, 255, 255, 0.72);
        --line: rgba(255, 255, 255, 0.12);
        --accent: #79d7ff;
        --accent-soft: #41d8cf;
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at center, #1f2140 0%, var(--bg-2) 35%, var(--bg-1) 100%);
        overflow-x: hidden;
      }

      a { color: inherit; text-decoration: none; }
      button { font: inherit; }
      img { display: block; max-width: 100%; }
      h1, h2, h3 { margin: 0; font-family: "Fraunces", serif; letter-spacing: -0.02em; }
      p { margin: 0; color: var(--ink-soft); line-height: 1.7; }

      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 16px 24px;
        background: rgba(10, 12, 20, 0.76);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .brand img {
        width: 166px;
        height: auto;
        object-fit: contain;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .nav a {
        color: rgba(255, 255, 255, 0.84);
        font-size: 0.92rem;
        font-weight: 700;
        padding: 8px 0;
      }

      .nav a:hover { color: #fff; }

      .header-actions {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .lang-switch {
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .lang-switch button {
        min-width: 42px;
        min-height: 38px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: rgba(255, 255, 255, 0.72);
        font-weight: 800;
        cursor: pointer;
      }

      .lang-switch button.is-active {
        background: #fff;
        color: #11131c;
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: #fff;
        font-weight: 700;
      }

      .hero {
        min-height: 100vh;
        padding: 132px 0 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero-inner {
        width: min(1600px, calc(100% - 32px));
        text-align: center;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.76);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.75rem;
        font-weight: 800;
      }

      .hero h1 {
        margin: 22px auto 16px;
        max-width: 16ch;
        font-size: clamp(3rem, 7vw, 5.8rem);
        line-height: 0.94;
      }

      .hero p {
        max-width: 66ch;
        margin: 0 auto;
        font-size: 1.04rem;
      }

      .category-section {
        min-height: 100vh;
        padding: 112px 0 54px;
        display: flex;
        align-items: center;
      }

      .section-inner {
        width: min(1800px, calc(100% - 28px));
        margin: 0 auto;
      }

      .section-copy {
        text-align: center;
        margin-bottom: 34px;
      }

      .section-copy h2 {
        font-size: clamp(2.3rem, 5vw, 4.4rem);
        margin-bottom: 10px;
      }

      .section-copy p {
        max-width: 60ch;
        margin: 0 auto;
      }

      .coverflow-shell {
        position: relative;
        min-height: 690px;
      }

      .coverflow-stage {
        position: relative;
        width: 100%;
        height: 690px;
        perspective: 1800px;
        transform-style: preserve-3d;
      }

      .coverflow-item {
        position: absolute;
        top: 110px;
        left: 50%;
        width: min(430px, calc(100vw - 140px));
        padding: 0;
        border: 0;
        background: transparent;
        transform-style: preserve-3d;
        cursor: pointer;
        transition: transform 520ms cubic-bezier(0.22, 1, 0.36, 1), opacity 240ms ease;
      }

      .coverflow-card {
        overflow: hidden;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 24px 56px rgba(0, 0, 0, 0.36);
      }

      .coverflow-card img {
        width: 100%;
        aspect-ratio: 5 / 6;
        object-fit: cover;
      }

      .coverflow-meta {
        padding: 14px 14px 16px;
        text-align: left;
      }

      .coverflow-meta strong {
        display: block;
        color: #fff;
        font-size: 1.05rem;
      }

      .coverflow-meta span {
        display: block;
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.66);
        font-size: 0.9rem;
      }

      .coverflow-reflection {
        width: 100%;
        height: 220px;
        margin-top: 12px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(0,0,0,0));
        transform: scaleY(-1);
        opacity: 0.2;
        filter: blur(2px);
      }

      .coverflow-item.is-active .coverflow-card {
        box-shadow: 0 34px 80px rgba(0, 0, 0, 0.5);
      }

      .nav-arrow {
        position: absolute;
        top: 50%;
        z-index: 3;
        width: 62px;
        height: 62px;
        margin-top: -18px;
        border-radius: 50%;
        border: 2px solid rgba(185, 212, 255, 0.9);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 2.1rem;
        cursor: pointer;
      }

      .nav-arrow.prev { left: 18px; }
      .nav-arrow.next { right: 18px; }

      .dots {
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 3;
      }

      .dots button {
        width: 12px;
        height: 12px;
        border: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.28);
        cursor: pointer;
      }

      .dots button.is-active {
        background: rgba(255, 255, 255, 0.92);
      }

      .active-panel {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: min(760px, calc(100% - 60px));
        text-align: center;
        z-index: 3;
      }

      .active-panel h3 {
        font-size: clamp(2rem, 3vw, 3.3rem);
        margin-bottom: 8px;
      }

      .active-panel p {
        margin: 0 auto;
        max-width: 60ch;
      }

      .active-actions {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 18px;
      }

      .active-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        font-weight: 800;
      }

      .active-actions .primary {
        background: linear-gradient(135deg, var(--accent-soft), var(--accent));
        color: #041019;
      }

      .active-actions .secondary {
        border: 1px solid var(--line);
        color: #fff;
      }

      .footer {
        padding: 64px 0 28px;
        background: rgba(5, 8, 15, 0.82);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .footer-wrap {
        width: min(1320px, calc(100% - 32px));
        margin: 0 auto;
      }

      .footer-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr 1fr;
        gap: 24px;
      }

      .footer-brand img {
        width: 190px;
        margin-bottom: 18px;
      }

      .footer-brand p,
      .footer h3,
      .footer a,
      .footer-bottom p {
        color: rgba(255, 255, 255, 0.84);
      }

      .footer h3 {
        margin-bottom: 12px;
        font-size: 1.1rem;
      }

      .footer-links {
        display: grid;
        gap: 10px;
      }

      .footer-links a:hover,
      .footer-bottom a:hover {
        color: #fff;
      }

      .footer-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 8px 0;
        margin-top: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      @media (max-width: 1100px) {
        .header {
          flex-direction: column;
          align-items: stretch;
        }

        .brand,
        .header-actions,
        .nav {
          justify-content: center;
        }

        .footer-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .header {
          padding: 12px 14px;
        }

        .brand img {
          width: 138px;
        }

        .nav {
          gap: 12px 16px;
        }

        .nav a {
          font-size: 0.84rem;
        }

        .hero {
          padding-top: 168px;
        }

        .coverflow-shell,
        .coverflow-stage {
          min-height: 620px;
          height: 620px;
        }

        .coverflow-item {
          top: 160px;
          width: min(290px, calc(100vw - 96px));
        }

        .nav-arrow {
          width: 52px;
          height: 52px;
          font-size: 1.8rem;
        }

        .nav-arrow.prev { left: 0; }
        .nav-arrow.next { right: 0; }

        .footer-grid {
          grid-template-columns: 1fr;
        }

        .footer-bottom {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <a class="brand" href="../index.html">
        <img src="../assets/images/logo-mavitrine-online-footer.png" alt="Ma Vitrine Online">
      </a>
      <nav class="nav" id="main-nav"></nav>
      <div class="header-actions">
        <div class="lang-switch" role="group" aria-label="Language switch">
          <button type="button" data-lang="fr">FR</button>
          <button type="button" data-lang="en">EN</button>
        </div>
        <a class="home-link" id="home-link" href="../index.html">Retour accueil</a>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <span class="eyebrow">Ma Vitrine Online</span>
          <h1 id="hero-title"></h1>
          <p id="hero-text"></p>
        </div>
      </section>
      <div id="sections-root"></div>
    </main>

    <footer class="footer">
      <div class="footer-wrap">
        <div class="footer-grid">
          <div class="footer-brand">
            <img src="../assets/images/logo-mavitrine-online-footer.png" alt="Ma Vitrine Online">
            <p id="footer-note"></p>
          </div>
          <div>
            <h3 id="footer-nav-title"></h3>
            <div class="footer-links" id="footer-nav-links"></div>
          </div>
          <div>
            <h3 id="footer-contact-title"></h3>
            <div class="footer-links">
              <a href="mailto:contact@mavitrineonline.fr">contact@mavitrineonline.fr</a>
              <a href="tel:+33611097655">06 11 09 76 55</a>
              <a href="tel:+33758661650">07 58 66 16 50</a>
              <a href="https://wa.me/33611097655" target="_blank" rel="noreferrer">WhatsApp</a>
            </div>
          </div>
          <div>
            <h3 id="footer-social-title"></h3>
            <div class="footer-links" id="footer-social-links"></div>
          </div>
        </div>
        <div class="footer-bottom">
          <a href="../mentions-legales.html" id="footer-legal-link">Mentions legales</a>
          <p>&copy; <span id="current-year"></span> Ma Vitrine Online</p>
        </div>
      </div>
    </footer>

    <script src="./shared/showroom-content.js"></script>
    <script>
      (function () {
        var content = window.MVO_SHOWROOM_CONTENT;
        var langButtons = Array.prototype.slice.call(document.querySelectorAll(".lang-switch button"));
        var currentLang = getInitialLang();

        function getInitialLang() {
          var queryLang = new URLSearchParams(window.location.search).get("lang");
          if (queryLang === "en" || queryLang === "fr") {
            window.localStorage.setItem("mvo-lang", queryLang);
            return queryLang;
          }
          var stored = window.localStorage.getItem("mvo-lang");
          return stored === "en" ? "en" : "fr";
        }

        function langText(fr, en) {
          return currentLang === "fr" ? fr : en;
        }

        function homeHref() {
          return "../index.html?lang=" + currentLang;
        }

        function byCategory(categoryId) {
          return content.models.filter(function (model) {
            return model.category === categoryId;
          });
        }

        function buildNav() {
          document.getElementById("main-nav").innerHTML = content.categories
            .map(function (category) {
              return '<a href="#' + category.anchor + '">' + category.menu + "</a>";
            })
            .join("");
        }

        function buildHero() {
          var labels = content.labels[currentLang];
          document.documentElement.setAttribute("lang", currentLang);
          document.title = labels.title;
          document.getElementById("hero-title").textContent = labels.title;
          document.getElementById("hero-text").textContent = labels.intro;
          document.getElementById("home-link").textContent = labels.backHome;
          document.getElementById("home-link").setAttribute("href", homeHref());
          document.getElementById("footer-note").textContent =
            currentLang === "fr"
              ? "Sites vitrines premium pour activites locales et services"
              : "Premium websites for local businesses and service activities";
          document.getElementById("footer-nav-title").textContent = currentLang === "fr" ? "Navigation" : "Navigation";
          document.getElementById("footer-contact-title").textContent = "Contact";
          document.getElementById("footer-social-title").textContent = currentLang === "fr" ? "Rythme digital" : "Digital touchpoints";
          document.getElementById("footer-legal-link").textContent = currentLang === "fr" ? "Mentions legales" : "Legal notice";
          document.getElementById("current-year").textContent = String(new Date().getFullYear());
          document.getElementById("footer-nav-links").innerHTML = [
            '<a href="' + homeHref() + '#top">' + (currentLang === "fr" ? "Accueil" : "Home") + "</a>",
            '<a href="' + homeHref() + '#styles">' + (currentLang === "fr" ? "Styles" : "Styles") + "</a>",
            '<a href="./?lang=' + currentLang + '">Showroom</a>',
            '<a href="' + homeHref() + '#offres">' + (currentLang === "fr" ? "Offres" : "Pricing") + "</a>",
            '<a href="' + homeHref() + '#contact">Contact</a>'
          ].join("");
          document.getElementById("footer-social-links").innerHTML = [
            '<a href="#' + content.categories[0].anchor + '">Instagram</a>',
            '<a href="#' + content.categories[1].anchor + '">Facebook</a>',
            '<a href="./?lang=' + currentLang + '">Showroom</a>'
          ].join("");
        }

        function buildSections() {
          var root = document.getElementById("sections-root");
          root.innerHTML = content.categories
            .map(function (category) {
              var models = byCategory(category.id);
              return (
                '<section class="category-section" id="' + category.anchor + '" data-category="' + category.id + '">' +
                  '<div class="section-inner">' +
                    '<div class="section-copy">' +
                      '<h2>' + langText(category.titleFr, category.titleEn) + "</h2>" +
                      '<p>' + langText(category.textFr, category.textEn) + "</p>" +
                    "</div>" +
                    '<div class="coverflow-shell">' +
                      '<div class="active-panel">' +
                        '<h3 class="active-title"></h3>' +
                        '<p class="active-text"></p>' +
                        '<div class="active-actions">' +
                          '<a class="primary active-demo" href="#"></a>' +
                          '<a class="secondary active-brief" href="#"></a>' +
                        "</div>" +
                      "</div>" +
                      '<button class="nav-arrow prev" type="button" aria-label="Previous">&#8249;</button>' +
                      '<div class="coverflow-stage">' +
                        models.map(function (model) {
                          return (
                            '<button class="coverflow-item" type="button" data-slug="' + model.slug + '">' +
                              '<div class="coverflow-card">' +
                                '<img src="./' + model.preview + '" alt="' + model.name + '">' +
                                '<div class="coverflow-meta"><strong>' + model.name + "</strong><span>" + model.style + "</span></div>" +
                              "</div>" +
                              '<div class="coverflow-reflection"></div>' +
                            "</button>"
                          );
                        }).join("") +
                      "</div>" +
                      '<button class="nav-arrow next" type="button" aria-label="Next">&#8250;</button>' +
                      '<div class="dots"></div>' +
                    "</div>" +
                  "</div>" +
                "</section>"
              );
            })
            .join("");
        }

        function updateSection(section, index) {
          var categoryId = section.getAttribute("data-category");
          var models = byCategory(categoryId);
          var items = Array.prototype.slice.call(section.querySelectorAll(".coverflow-item"));
          var dots = Array.prototype.slice.call(section.querySelectorAll(".dots button"));
          var labels = content.labels[currentLang];
          var total = items.length;
          var active = ((index % total) + total) % total;
          section.setAttribute("data-active-index", String(active));

          items.forEach(function (item, itemIndex) {
            var offset = itemIndex - active;
            if (offset > total / 2) offset -= total;
            if (offset < -total / 2) offset += total;

            var abs = Math.abs(offset);
            var sign = offset === 0 ? 0 : offset / abs;
            var translateX = offset * 220;
            var translateZ = -abs * 220;
            var rotateY = -sign * Math.min(abs * 48, 58);
            var scale = 1 - abs * 0.12;
            var opacity = abs > 3 ? 0 : 1 - abs * 0.18;

            item.style.transform =
              "translateX(calc(-50% + " + translateX + "px)) translateZ(" + translateZ + "px) rotateY(" + rotateY + "deg) scale(" + scale + ")";
            item.style.opacity = String(opacity);
            item.style.zIndex = String(100 - abs);
            item.classList.toggle("is-active", itemIndex === active);
          });

          dots.forEach(function (dot, dotIndex) {
            dot.classList.toggle("is-active", dotIndex === active);
          });

          var model = models[active];
          section.querySelector(".active-title").textContent = model.name;
          section.querySelector(".active-text").textContent = currentLang === "fr" ? model.blurbFr : model.blurbEn;
          section.querySelector(".active-demo").textContent = labels.openDemo;
          section.querySelector(".active-demo").setAttribute("href", "./" + model.slug + "/index.html");
          section.querySelector(".active-brief").textContent = labels.viewBrief;
          section.querySelector(".active-brief").setAttribute("href", "./" + model.slug + "/index.html#mvo-summary");
        }

        function initSections() {
          Array.prototype.slice.call(document.querySelectorAll(".category-section")).forEach(function (section) {
            var items = Array.prototype.slice.call(section.querySelectorAll(".coverflow-item"));
            var dotsWrap = section.querySelector(".dots");

            dotsWrap.innerHTML = items.map(function (_, index) {
              return '<button type="button" aria-label="Go to item ' + (index + 1) + '"></button>';
            }).join("");

            Array.prototype.slice.call(dotsWrap.querySelectorAll("button")).forEach(function (dot, index) {
              dot.addEventListener("click", function () {
                updateSection(section, index);
              });
            });

            items.forEach(function (item, index) {
              item.addEventListener("click", function () {
                updateSection(section, index);
              });
            });

            section.querySelector(".prev").addEventListener("click", function () {
              updateSection(section, Number(section.getAttribute("data-active-index") || "0") - 1);
            });

            section.querySelector(".next").addEventListener("click", function () {
              updateSection(section, Number(section.getAttribute("data-active-index") || "0") + 1);
            });

            updateSection(section, 0);
          });
        }

        function syncLangButtons() {
          langButtons.forEach(function (button) {
            var isActive = button.getAttribute("data-lang") === currentLang;
            button.classList.toggle("is-active", isActive);
            button.addEventListener("click", function () {
              var next = button.getAttribute("data-lang");
              if (!next || next === currentLang) return;
              currentLang = next;
              window.localStorage.setItem("mvo-lang", currentLang);
              history.replaceState(null, "", window.location.pathname + "?lang=" + currentLang);
              render();
            });
          });
        }

        function render() {
          buildNav();
          buildHero();
          buildSections();
          syncLangButtons();
          initSections();
        }

        render();
      })();
    </script>
  </body>
</html>
