<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ma Vitrine Online | Showroom</title>
    <meta name="description" content="Showroom Ma Vitrine Online avec 6 categories de templates dans un coverflow 3D pleine largeur.">
    <link rel="icon" href="../assets/images/logo-mavitrine-online.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #050507;
        --bg-soft: #121323;
        --bg-panel: rgba(26, 28, 48, 0.72);
        --ink: rgba(255, 255, 255, 0.96);
        --ink-soft: rgba(255, 255, 255, 0.72);
        --line: rgba(255, 255, 255, 0.12);
        --accent: #7c6cf2;
        --accent-2: #9b62d9;
        --accent-soft: rgba(124, 108, 242, 0.18);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        color: var(--ink);
        background: #000;
        background-image:
          radial-gradient(circle at 50% 18%, rgba(58, 46, 120, 0.42), transparent 32%),
          radial-gradient(circle at 50% 45%, rgba(18, 22, 48, 0.72), transparent 55%),
          linear-gradient(180deg, #000 0%, #0a0b12 28%, #111325 100%);
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% 48%, rgba(255, 255, 255, 0.08), transparent 26%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 32%);
        opacity: 0.65;
      }

      a { color: inherit; text-decoration: none; }
      img { display: block; max-width: 100%; }
      button { font: inherit; }
      h1, h2, h3, p { margin: 0; }

      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 78px;
        padding: 10px 24px;
        background: rgba(0, 0, 0, 0.84);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
      }

      .brand img {
        width: 164px;
        max-height: 56px;
        height: auto;
        object-fit: contain;
      }

      .header-right {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 18px;
        min-width: 0;
        flex: 1 1 auto;
      }

      .main-menu {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 18px;
        min-width: 0;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .main-menu::-webkit-scrollbar { display: none; }

      .menu-item {
        position: relative;
        color: rgba(255, 255, 255, 0.82);
        font-size: 0.95rem;
        font-weight: 500;
        white-space: nowrap;
        padding: 8px 0;
        transition: color 180ms ease, transform 180ms ease;
      }

      .menu-item::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 180ms ease;
      }

      .menu-item:hover,
      .menu-item.is-active {
        color: #fff;
        transform: translateY(-1px);
      }

      .menu-item:hover::after,
      .menu-item.is-active::after {
        width: 100%;
      }

      .header-tools {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        flex: 0 0 auto;
      }

      .lang-switch {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .lang-switch button,
      .home-link {
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.86);
        cursor: pointer;
        transition: border-color 180ms ease, background 180ms ease, color 180ms ease;
      }

      .lang-switch button {
        min-width: 48px;
        font-weight: 800;
      }

      .lang-switch button.is-active,
      .home-link:hover {
        color: #fff;
        border-color: rgba(124, 108, 242, 0.5);
        background: rgba(124, 108, 242, 0.16);
      }

      .page-intro {
        padding: 124px 32px 18px;
      }

      .page-intro-inner {
        width: min(1240px, 100%);
        margin: 0 auto;
      }

      .section-kicker {
        display: inline-block;
        color: #8f80ff;
        font-size: clamp(1.1rem, 2vw, 1.4rem);
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .page-intro h1 {
        margin-top: 14px;
        max-width: 16ch;
        font-size: clamp(2.35rem, 5.4vw, 4.3rem);
        line-height: 0.98;
        font-weight: 800;
        letter-spacing: -0.05em;
      }

      .page-intro p {
        margin-top: 16px;
        max-width: 64ch;
        color: var(--ink-soft);
        font-size: 1rem;
        line-height: 1.7;
      }

      .category-section {
        position: relative;
        min-height: 100vh;
        padding: 18px 0 12px;
        scroll-margin-top: 88px;
      }

      .section-head {
        width: min(1240px, calc(100% - 40px));
        margin: 0 auto 4px;
        text-align: center;
      }

      .section-head .section-kicker {
        font-size: 0.98rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .section-head h2 {
        margin-top: 10px;
        font-size: clamp(1.9rem, 3.8vw, 2.8rem);
        line-height: 1.02;
        font-weight: 800;
        letter-spacing: -0.05em;
      }

      .section-head p {
        margin: 10px auto 0;
        max-width: 54ch;
        color: var(--ink-soft);
        font-size: 0.98rem;
        line-height: 1.7;
      }

      .coverflow-wrapper {
        position: relative;
        width: 100%;
        min-height: 700px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .coverflow-container {
        position: relative;
        width: 100%;
        min-height: 700px;
        display: flex;
        align-items: center;
        justify-content: center;
        perspective: 1400px;
      }

      .coverflow-stage {
        position: relative;
        width: 100%;
        height: 560px;
        transform-style: preserve-3d;
      }

      .coverflow-item {
        position: absolute;
        top: 10px;
        left: 50%;
        width: min(350px, calc(100vw - 120px));
        transform-style: preserve-3d;
        cursor: pointer;
        transition: transform 520ms cubic-bezier(0.22, 1, 0.36, 1), opacity 260ms ease;
      }

      .coverflow-card {
        position: relative;
        overflow: hidden;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(31, 34, 58, 0.96), rgba(18, 20, 35, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 28px 60px rgba(0, 0, 0, 0.65);
      }

      .cover-media {
        aspect-ratio: 5 / 6;
        overflow: hidden;
        background: #141621;
      }

      .cover-media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .cover-meta {
        padding: 15px 18px 18px;
      }

      .cover-meta h3 {
        font-size: 1.02rem;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .cover-meta p {
        margin-top: 8px;
        color: var(--ink-soft);
        font-size: 0.95rem;
        line-height: 1.55;
      }

      .cover-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .cover-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 14px;
        border-radius: 999px;
        font-size: 0.92rem;
        font-weight: 800;
      }

      .cover-actions .button-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
      }

      .cover-actions .button-secondary {
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.9);
      }

      .reflection {
        width: 100%;
        height: 150px;
        margin-top: 8px;
        border-radius: 18px;
        transform: scaleY(-1);
        opacity: 0.16;
        filter: blur(2px);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(0, 0, 0, 0));
      }

      .nav-button {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 4;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 2rem;
        cursor: pointer;
        backdrop-filter: blur(12px);
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      .nav-button:hover {
        transform: translateY(-50%) scale(1.06);
        background: rgba(124, 108, 242, 0.16);
        border-color: rgba(124, 108, 242, 0.42);
      }

      .nav-button.prev { left: 40px; }
      .nav-button.next { right: 40px; }

      .dots {
        position: absolute;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 4;
      }

      .dots button {
        width: 10px;
        height: 10px;
        border: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.26);
        cursor: pointer;
        transition: transform 180ms ease, background 180ms ease;
      }

      .dots button.is-active {
        background: rgba(255, 255, 255, 0.92);
        transform: scale(1.28);
      }

      .footer {
        padding: 64px 0 28px;
        background: rgba(5, 8, 15, 0.9);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .footer-wrap {
        width: min(1320px, calc(100% - 32px));
        margin: 0 auto;
      }

      .footer-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr 1fr;
        gap: 24px;
      }

      .footer-brand img {
        width: 180px;
        margin-bottom: 18px;
      }

      .footer-brand p,
      .footer h3,
      .footer a,
      .footer-bottom p {
        color: rgba(255, 255, 255, 0.84);
      }

      .footer h3 {
        margin-bottom: 12px;
        font-size: 1.1rem;
      }

      .footer-links {
        display: grid;
        gap: 10px;
      }

      .footer-links a:hover,
      .footer-bottom a:hover {
        color: #fff;
      }

      .footer-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 8px 0;
        margin-top: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      @media (max-width: 1180px) {
        .header {
          padding: 12px 18px;
        }

        .header-right {
          gap: 14px;
        }

        .main-menu,
        .header-tools {
          justify-content: flex-end;
        }

        .page-intro {
          padding-top: 132px;
        }

        .footer-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 820px) {
        .brand img {
          width: 138px;
          max-height: 48px;
        }

        .header {
          gap: 14px;
          padding: 10px 14px;
        }

        .menu-item {
          flex: 0 0 auto;
          font-size: 0.88rem;
        }

        .main-menu {
          width: auto;
          justify-content: flex-start;
          padding-bottom: 6px;
        }

        .header-right {
          flex-direction: column;
          align-items: stretch;
        }

        .page-intro {
          padding-inline: 20px;
          padding-top: 178px;
        }

        .section-head {
          width: min(100%, calc(100% - 24px));
        }

        .coverflow-wrapper,
        .coverflow-container {
          min-height: 610px;
        }

        .coverflow-stage {
          height: 510px;
        }

        .coverflow-item {
          width: min(288px, calc(100vw - 72px));
        }

        .nav-button {
          width: 50px;
          height: 50px;
          font-size: 1.7rem;
        }

        .nav-button.prev { left: 10px; }
        .nav-button.next { right: 10px; }

        .footer-grid {
          grid-template-columns: 1fr;
        }

        .footer-bottom {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <a class="brand" href="../index.html?lang=fr">
        <img src="../assets/branding/logo-light-transparent.png" alt="Ma Vitrine Online">
      </a>
      <div class="header-right">
        <nav class="main-menu" id="main-nav"></nav>
        <div class="header-tools">
          <div class="lang-switch" role="group" aria-label="Language switch">
            <button type="button" data-lang="fr">FR</button>
            <button type="button" data-lang="en">EN</button>
          </div>
          <a class="home-link" id="home-link" href="../index.html?lang=fr">Retour accueil</a>
        </div>
      </div>
    </header>

    <main>
      <section class="page-intro" id="top">
        <div class="page-intro-inner">
          <span class="section-kicker">Ma Vitrine Online</span>
          <h1 id="hero-title"></h1>
          <p id="hero-text"></p>
        </div>
      </section>
      <div id="sections-root"></div>
    </main>

    <footer class="footer">
      <div class="footer-wrap">
        <div class="footer-grid">
          <div class="footer-brand">
            <img src="../assets/branding/logo-light-transparent.png" alt="Ma Vitrine Online">
            <p id="footer-note"></p>
          </div>
          <div>
            <h3 id="footer-nav-title"></h3>
            <div class="footer-links" id="footer-nav-links"></div>
          </div>
          <div>
            <h3 id="footer-contact-title"></h3>
            <div class="footer-links">
              <a href="mailto:contact@mavitrineonline.fr">contact@mavitrineonline.fr</a>
              <a href="tel:+33611097655">06 11 09 76 55</a>
              <a href="tel:+33758661650">07 58 66 16 50</a>
              <a href="https://wa.me/33611097655" target="_blank" rel="noreferrer">WhatsApp</a>
            </div>
          </div>
          <div>
            <h3 id="footer-social-title"></h3>
            <div class="footer-links" id="footer-social-links"></div>
          </div>
        </div>
        <div class="footer-bottom">
          <a href="../mentions-legales.html" id="footer-legal-link">Mentions legales</a>
          <p>&copy; <span id="current-year"></span> Ma Vitrine Online</p>
        </div>
      </div>
    </footer>

    <script src="./shared/showroom-content.js"></script>
    <script>
      (function () {
        var content = window.MVO_SHOWROOM_CONTENT;
        var langButtons = Array.prototype.slice.call(document.querySelectorAll(".lang-switch button"));
        var currentLang = getInitialLang();

        function getInitialLang() {
          var queryLang = new URLSearchParams(window.location.search).get("lang");
          if (queryLang === "en" || queryLang === "fr") {
            window.localStorage.setItem("mvo-lang", queryLang);
            return queryLang;
          }
          var stored = window.localStorage.getItem("mvo-lang");
          return stored === "en" ? "en" : "fr";
        }

        function text(fr, en) {
          return currentLang === "fr" ? fr : en;
        }

        function homeHref() {
          return "../index.html?lang=" + currentLang;
        }

        function byCategory(categoryId) {
          return content.models.filter(function (model) {
            return model.category === categoryId;
          });
        }

        function buildNav() {
          document.getElementById("main-nav").innerHTML = content.categories
            .map(function (category, index) {
              var activeClass = index === 0 ? "menu-item is-active" : "menu-item";
              return '<a class="' + activeClass + '" href="#' + category.anchor + '" data-anchor="' + category.anchor + '">' + text(category.menuFr, category.menuEn) + "</a>";
            })
            .join("");
        }

        function buildHero() {
          var labels = content.labels[currentLang];
          document.documentElement.setAttribute("lang", currentLang);
          document.title = labels.title;
          document.getElementById("hero-title").textContent = labels.title;
          document.getElementById("hero-text").textContent = labels.intro;
          document.getElementById("home-link").textContent = labels.backHome;
          document.getElementById("home-link").setAttribute("href", homeHref());
          document.getElementById("footer-note").textContent =
            currentLang === "fr"
              ? "Sites vitrines premium pour activites locales et services"
              : "Premium websites for local businesses and service activities";
          document.getElementById("footer-nav-title").textContent = currentLang === "fr" ? "Navigation" : "Navigation";
          document.getElementById("footer-contact-title").textContent = "Contact";
          document.getElementById("footer-social-title").textContent = currentLang === "fr" ? "Rythme digital" : "Digital touchpoints";
          document.getElementById("footer-legal-link").textContent = currentLang === "fr" ? "Mentions legales" : "Legal notice";
          document.getElementById("current-year").textContent = String(new Date().getFullYear());
          document.getElementById("footer-nav-links").innerHTML = [
            '<a href="' + homeHref() + '#top">' + (currentLang === "fr" ? "Accueil" : "Home") + "</a>",
            '<a href="' + homeHref() + '#styles">' + (currentLang === "fr" ? "Styles" : "Styles") + "</a>",
            '<a href="./?lang=' + currentLang + '">Showroom</a>',
            '<a href="' + homeHref() + '#offres">' + (currentLang === "fr" ? "Offres" : "Pricing") + "</a>",
            '<a href="' + homeHref() + '#contact">Contact</a>'
          ].join("");
          document.getElementById("footer-social-links").innerHTML = [
            '<a href="https://www.instagram.com/hichamaifout/" target="_blank" rel="noopener">Instagram</a>',
            '<a href="https://www.facebook.com/hicham.aifout" target="_blank" rel="noopener">Facebook</a>',
            '<a href="./?lang=' + currentLang + '">Showroom</a>'
          ].join("");
        }

        function buildSections() {
          var labels = content.labels[currentLang];
          var root = document.getElementById("sections-root");
          root.innerHTML = content.categories.map(function (category) {
            var models = byCategory(category.id);
            return (
              '<section class="category-section" id="' + category.anchor + '" data-category="' + category.id + '">' +
                '<div class="section-head">' +
                  '<span class="section-kicker">' + text(category.menuFr, category.menuEn) + "</span>" +
                  '<h2>' + text(category.titleFr, category.titleEn) + "</h2>" +
                  '<p>' + text(category.textFr, category.textEn) + "</p>" +
                "</div>" +
                '<div class="coverflow-wrapper">' +
                  '<div class="coverflow-container">' +
                    '<button class="nav-button prev" type="button" aria-label="Previous">&#8249;</button>' +
                    '<div class="coverflow-stage">' +
                      models.map(function (model) {
                        return (
                          '<article class="coverflow-item" data-slug="' + model.slug + '">' +
                            '<div class="coverflow-card">' +
                              '<div class="cover-media">' +
                                '<img src="./' + model.preview + '" alt="' + model.name + '">' +
                              "</div>" +
                              '<div class="cover-meta">' +
                                "<h3>" + model.name + "</h3>" +
                                "<p>" + text(model.blurbFr, model.blurbEn) + "</p>" +
                                '<div class="cover-actions">' +
                                  '<a class="button-primary" href="./' + model.slug + '/index.html">' + labels.openDemo + "</a>" +
                                  '<a class="button-secondary" href="./' + model.slug + '/index.html#mvo-summary">' + labels.viewBrief + "</a>" +
                                "</div>" +
                              "</div>" +
                            "</div>" +
                            '<div class="reflection"></div>' +
                          "</article>"
                        );
                      }).join("") +
                    "</div>" +
                    '<button class="nav-button next" type="button" aria-label="Next">&#8250;</button>' +
                    '<div class="dots"></div>' +
                  "</div>" +
                "</div>" +
              "</section>"
            );
          }).join("");
        }

        function updateSection(section, index) {
          var items = Array.prototype.slice.call(section.querySelectorAll(".coverflow-item"));
          var dots = Array.prototype.slice.call(section.querySelectorAll(".dots button"));
          var total = items.length;
          var active = ((index % total) + total) % total;
          section.setAttribute("data-active-index", String(active));

          items.forEach(function (item, itemIndex) {
            var offset = itemIndex - active;
            if (offset > total / 2) offset -= total;
            if (offset < -total / 2) offset += total;

            var abs = Math.abs(offset);
            var sign = offset === 0 ? 0 : offset / abs;
            var translateX = offset * 170;
            var translateZ = -abs * 210;
            var rotateY = -sign * Math.min(abs * 45, 56);
            var scale = 1 - abs * 0.12;
            var opacity = abs > 3 ? 0 : 1 - abs * 0.18;

            item.style.transform =
              "translateX(calc(-50% + " + translateX + "px)) translateZ(" + translateZ + "px) rotateY(" + rotateY + "deg) scale(" + scale + ")";
            item.style.opacity = String(opacity);
            item.style.zIndex = String(100 - abs);
            item.classList.toggle("is-active", itemIndex === active);
          });

          dots.forEach(function (dot, dotIndex) {
            dot.classList.toggle("is-active", dotIndex === active);
          });
        }

        function initSections() {
          Array.prototype.slice.call(document.querySelectorAll(".category-section")).forEach(function (section) {
            var items = Array.prototype.slice.call(section.querySelectorAll(".coverflow-item"));
            var dotsWrap = section.querySelector(".dots");

            dotsWrap.innerHTML = items.map(function (_, index) {
              return '<button type="button" aria-label="Go to item ' + (index + 1) + '"></button>';
            }).join("");

            Array.prototype.slice.call(dotsWrap.querySelectorAll("button")).forEach(function (dot, index) {
              dot.addEventListener("click", function () {
                updateSection(section, index);
              });
            });

            items.forEach(function (item, index) {
              item.addEventListener("click", function (event) {
                if (event.target.closest("a")) return;
                updateSection(section, index);
              });
            });

            section.querySelector(".prev").addEventListener("click", function () {
              updateSection(section, Number(section.getAttribute("data-active-index") || "0") - 1);
            });

            section.querySelector(".next").addEventListener("click", function () {
              updateSection(section, Number(section.getAttribute("data-active-index") || "0") + 1);
            });

            updateSection(section, 0);
          });
        }

        function syncLangButtons() {
          langButtons.forEach(function (button) {
            var isActive = button.getAttribute("data-lang") === currentLang;
            button.classList.toggle("is-active", isActive);
            button.onclick = function () {
              var next = button.getAttribute("data-lang");
              if (!next || next === currentLang) return;
              currentLang = next;
              window.localStorage.setItem("mvo-lang", currentLang);
              history.replaceState(null, "", window.location.pathname + "?lang=" + currentLang);
              render();
            };
          });
        }

        function syncActiveMenu() {
          var links = Array.prototype.slice.call(document.querySelectorAll(".menu-item"));
          var sections = Array.prototype.slice.call(document.querySelectorAll(".category-section"));

          function setActive(anchor) {
            links.forEach(function (link) {
              link.classList.toggle("is-active", link.getAttribute("data-anchor") === anchor);
            });
          }

          var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                setActive(entry.target.id);
              }
            });
          }, { rootMargin: "-35% 0px -45% 0px", threshold: 0.1 });

          sections.forEach(function (section) {
            observer.observe(section);
          });
        }

        function render() {
          buildNav();
          buildHero();
          buildSections();
          syncLangButtons();
          initSections();
          syncActiveMenu();
        }

        render();
      })();
    </script>
  </body>
</html>
