<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ma Vitrine Online | Showroom de styles de sites vitrines</title>
    <meta name="description" content="Showroom structure par categories pour choisir un style de site vitrine premium adapte a plusieurs activites.">
    <link rel="icon" href="./shared/logo-ma-vitrine-online.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --ink: #1d2730;
        --ink-soft: rgba(29, 39, 48, 0.72);
        --line: rgba(29, 39, 48, 0.1);
        --accent: #3dc7c2;
        --accent-deep: #16939b;
        --panel: rgba(255, 255, 255, 0.9);
        --shadow: 0 28px 70px rgba(17, 25, 35, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(61, 199, 194, 0.14), transparent 28%),
          radial-gradient(circle at bottom right, rgba(214, 181, 141, 0.18), transparent 22%),
          linear-gradient(180deg, #fcfffe 0%, #f3f6f6 48%, #eef0ef 100%);
      }

      a { color: inherit; text-decoration: none; }
      img { max-width: 100%; display: block; }
      h1, h2, h3 { margin: 0; font-family: "Fraunces", serif; letter-spacing: -0.02em; }
      p { margin: 0; color: var(--ink-soft); line-height: 1.75; }

      .shell {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
      }

      .hero {
        padding: 34px 0 18px;
      }

      .hero-card,
      .filters,
      .card,
      .foot-card {
        border-radius: 30px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .hero-card {
        padding: 28px;
      }

      .hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 16px;
      }

      .brand img {
        width: 190px;
        height: auto;
      }

      .hero-actions {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .lang-switch {
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border-radius: 999px;
        background: rgba(29, 39, 48, 0.06);
      }

      .lang-switch button {
        min-width: 42px;
        min-height: 38px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--ink-soft);
        font-weight: 800;
      }

      .lang-switch button.is-active {
        background: var(--ink);
        color: #fff;
      }

      .hero-badge,
      .card-style {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(61, 199, 194, 0.12);
        color: var(--accent-deep);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 24px 0 14px;
        font-size: clamp(2.5rem, 5vw, 4.9rem);
        line-height: 0.95;
      }

      .hero-copy {
        max-width: 74ch;
        font-size: 1.04rem;
      }

      .hero-points {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 24px;
      }

      .hero-point {
        padding: 18px;
        border-radius: 22px;
        background: #fff;
        border: 1px solid var(--line);
      }

      .hero-point strong {
        display: block;
        margin-bottom: 8px;
        font-size: 1rem;
      }

      .filters {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 18px 22px;
        margin: 20px 0 18px;
      }

      .filters h2 {
        font-size: clamp(1.8rem, 2.8vw, 2.7rem);
      }

      .filter-group {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .filter-chip {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      .filter-chip.is-active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        padding-bottom: 42px;
      }

      .card {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        overflow: hidden;
      }

      .card-preview {
        position: relative;
        display: block;
        overflow: hidden;
        aspect-ratio: 16 / 10;
        background:
          radial-gradient(circle at top right, rgba(61, 199, 194, 0.18), transparent 32%),
          linear-gradient(160deg, rgba(10, 18, 26, 0.04), rgba(10, 18, 26, 0.14));
      }

      .card-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 220ms ease;
      }

      .card:hover .card-preview img {
        transform: scale(1.04);
      }

      .card-preview-badge {
        position: absolute;
        left: 14px;
        bottom: 14px;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(12, 18, 24, 0.72);
        color: #fff;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .card-body {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 22px;
        height: 100%;
      }

      .card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .card-category {
        color: rgba(29, 39, 48, 0.38);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .card h3 {
        font-size: 1.3rem;
        line-height: 1.16;
      }

      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .card-tags span {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(29, 39, 48, 0.06);
        font-size: 0.82rem;
        font-weight: 700;
      }

      .card-actions {
        display: flex;
        gap: 10px;
        margin-top: auto;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        font-weight: 800;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #7ae1db);
      }

      .btn-secondary {
        border: 1px solid var(--line);
        background: #fff;
      }

      .foot {
        padding: 0 0 40px;
      }

      .foot-card {
        padding: 22px 24px;
        background: rgba(29, 39, 48, 0.94);
      }

      .foot-card strong,
      .foot-card h2 {
        color: #fff;
      }

      .foot-card p {
        color: rgba(255, 255, 255, 0.74);
      }

      @media (max-width: 1100px) {
        .hero-points,
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .filters {
          flex-direction: column;
          align-items: flex-start;
        }

        .filter-group {
          justify-content: flex-start;
        }
      }

      @media (max-width: 760px) {
        .hero-card,
        .filters,
        .foot-card {
          border-radius: 24px;
        }

        .hero-points,
        .grid,
        .card-actions {
          grid-template-columns: 1fr;
          flex-direction: column;
        }

        .btn { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-card">
          <div class="hero-top">
            <div class="brand">
              <img src="./shared/logo-ma-vitrine-online.svg" alt="Ma Vitrine Online">
              <span class="hero-badge" id="hero-badge"></span>
            </div>
            <div class="hero-actions">
              <div class="lang-switch" role="group" aria-label="Language switch">
                <button class="is-active" type="button" data-lang="fr">FR</button>
                <button type="button" data-lang="en">EN</button>
              </div>
            </div>
          </div>
          <h1 id="hero-title"></h1>
          <p class="hero-copy" id="hero-copy"></p>
          <div class="hero-points" id="hero-points"></div>
        </div>
      </section>

      <section>
        <div class="filters">
          <div>
            <h2 id="section-title"></h2>
            <p id="section-copy"></p>
          </div>
          <div>
            <div style="font-weight:800;margin-bottom:10px;" id="filter-label"></div>
            <div class="filter-group" id="filter-group"></div>
          </div>
        </div>

        <div class="grid" id="catalogue-grid"></div>
      </section>

      <section class="foot">
        <div class="foot-card">
          <h2 id="foot-title"></h2>
          <p id="foot-copy"></p>
        </div>
      </section>
    </main>

    <script src="./shared/showroom-content.js"></script>
    <script>
      (function () {
        var content = window.MVO_SHOWROOM_CONTENT;
        var currentLang = "fr";
        var currentCategory = "all";
        var langButtons = Array.prototype.slice.call(document.querySelectorAll(".lang-switch button"));

        function tCategory(category) {
          return currentLang === "fr" ? category.fr : category.en;
        }

        function renderHero() {
          var page = content.languages[currentLang];
          document.documentElement.setAttribute("lang", currentLang);
          document.getElementById("hero-badge").textContent = page.badge;
          document.getElementById("hero-title").textContent = page.title;
          document.getElementById("hero-copy").textContent = page.text;
          document.getElementById("hero-points").innerHTML = page.points
            .map(function (point) {
              return "<article class=\"hero-point\"><strong>" + point[0] + "</strong><p>" + point[1] + "</p></article>";
            })
            .join("");
          document.getElementById("section-title").textContent = page.sectionTitle;
          document.getElementById("section-copy").textContent = page.sectionText;
          document.getElementById("filter-label").textContent = page.filterLabel;
          document.getElementById("foot-title").textContent = page.footTitle;
          document.getElementById("foot-copy").textContent = page.footText;
          document.title =
            currentLang === "fr"
              ? "Ma Vitrine Online | Showroom de styles de sites vitrines"
              : "Ma Vitrine Online | Website style showroom";
        }

        function renderFilters() {
          document.getElementById("filter-group").innerHTML = content.categories
            .map(function (category) {
              return (
                '<button class="filter-chip' +
                (category.id === currentCategory ? " is-active" : "") +
                '" type="button" data-category="' +
                category.id +
                '">' +
                tCategory(category) +
                "</button>"
              );
            })
            .join("");

          Array.prototype.slice.call(document.querySelectorAll(".filter-chip")).forEach(function (button) {
            button.addEventListener("click", function () {
              currentCategory = button.getAttribute("data-category") || "all";
              renderFilters();
              renderCards();
            });
          });
        }

        function renderCards() {
          var page = content.languages[currentLang];
          var models = content.models.filter(function (model) {
            return currentCategory === "all" || model.category === currentCategory;
          });

          document.getElementById("catalogue-grid").innerHTML = models
            .map(function (model, index) {
              var name = currentLang === "fr" ? model.nameFr : model.nameEn;
              var style = currentLang === "fr" ? model.styleFr : model.styleEn;
              var text = currentLang === "fr" ? model.textFr : model.textEn;
              var tags = currentLang === "fr" ? model.tagsFr : model.tagsEn;
              var category = tCategory(content.categories.find(function (item) { return item.id === model.category; }));

              return (
                '<article class="card">' +
                '<a class="card-preview" href="./' + model.demo + '">' +
                '<img src="./' + model.preview + '" alt="' + name + '">' +
                '<span class="card-preview-badge">' + page.demo + "</span>" +
                "</a>" +
                '<div class="card-body">' +
                '<div class="card-top"><span class="card-style">' + style + '</span><span class="card-category">' + String(index + 1).padStart(2, "0") + " · " + category + "</span></div>" +
                "<h3>" + name + "</h3>" +
                "<p>" + text + "</p>" +
                '<div class="card-tags">' +
                tags.map(function (tag) { return "<span>" + tag + "</span>"; }).join("") +
                "</div>" +
                '<div class="card-actions">' +
                '<a class="btn btn-primary" href="./' + model.demo + '">' + page.demo + "</a>" +
                '<a class="btn btn-secondary" href="./' + model.brief + '">' + page.brief + "</a>" +
                "</div>" +
                "</div>" +
                "</article>"
              );
            })
            .join("");
        }

        function bindLangButtons() {
          langButtons.forEach(function (button) {
            button.addEventListener("click", function () {
              currentLang = button.getAttribute("data-lang") || "fr";
              langButtons.forEach(function (node) {
                node.classList.toggle("is-active", node === button);
              });
              renderHero();
              renderFilters();
              renderCards();
            });
          });
        }

        renderHero();
        renderFilters();
        renderCards();
        bindLangButtons();
      })();
    </script>
  </body>
</html>
